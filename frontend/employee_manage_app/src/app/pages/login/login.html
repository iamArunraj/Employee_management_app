<div class="parent">
    <div class="login-container">
        <div class="container">
            <div class="row h-100 align-items-center justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                    <div class="login-card">
                        <!-- Header -->
                        <div class="login-header text-center mb-4">
                            <div class="logo-circle">
                                <i class="fas fa-user-tie"></i>
                            </div>
                            <h1 class="login-title mt-3">Welcome Back</h1>
                            <p class="login-subtitle text-muted">Employee Management System</p>
                        </div>

                        <!-- Login Form -->
                        <form class="login-form">
                            <!-- Email Input -->
                            <div class="mb-3 input-group-wrapper">
                                <label for="email" class="form-label">Email Address</label>
                                <div class="input-icon-wrapper">
                                    <span class="input-icon">📧</span>
                                    <input type="email" [(ngModel)]="loginObj.email" name="email" class="form-control input-field" id="email"
                                        placeholder="Enter your email" required>
                                </div>
                            </div>

                            <!-- Password Input -->
                            <div class="mb-3 input-group-wrapper">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-icon-wrapper">
                                    <span class="input-icon">🔒</span>
                                    <input type="password" [(ngModel)]="loginObj.contactNo" name="contactNo" class="form-control input-field" id="password"
                                        placeholder="Enter your password" required>
                                </div>
                            </div>

                            <!-- Login Button -->
                            <button type="button" (click)="onLogin()" class="btn btn-primary login-btn w-100 mb-3">
                                <span class="btn-text">Sign In</span>
                                <span class="btn-loader"></span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
